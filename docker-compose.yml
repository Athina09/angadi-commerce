services:
  postgres:
    image: postgres:16-alpine
    container_name: nextgen-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nextgen_commerce
    ports:
      - "5432:5432"
    volumes:
      - nextgen_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextgen_commerce"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nextgen_pg_data:
